<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>裤佬代理加速</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0a0a14;
            color: #ffffff;
            position: relative;
            overflow-x: hidden;
        }

        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.55;
            pointer-events: none;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(46, 91, 255, 0.18) 0%, rgba(10, 10, 20, 0.7) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .marquee-ad {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .marquee-ad a {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 18s linear infinite;
            white-space: nowrap;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.3px;
            background: linear-gradient(135deg, #FF6B9D, #C44DFF, #4D7CFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .main-card {
            width: 100%;
            max-width: 500px;
            background: rgba(18, 18, 32, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 32px 28px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 10px;
        }

        .main-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.25);
        }

        .brand {
            text-align: center;
            margin-bottom: 8px;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #FFFFFF 0%, #B0C6FF 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: rgba(210, 210, 255, 0.85);
            background: rgba(255, 255, 255, 0.06);
            padding: 6px 18px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .input-field {
            margin-bottom: 22px;
        }

        .label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #c9d3ff;
            margin-bottom: 10px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .input-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(92, 156, 255, 0.7);
            box-shadow: 0 0 0 3px rgba(76, 130, 245, 0.25);
        }

        input {
            width: 100%;
            background: transparent;
            border: none;
            padding: 14px 16px;
            font-size: 0.95rem;
            color: #fff;
            outline: none;
            border-radius: 16px;
            font-weight: 400;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.45);
            font-weight: 400;
        }

        .proxy-section {
            margin-bottom: 20px;
        }

        .proxy-scroll {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 6px 2px 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(92, 156, 255, 0.6) rgba(255,255,255,0.08);
        }

        .proxy-scroll::-webkit-scrollbar {
            height: 5px;
        }

        .proxy-scroll::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .proxy-scroll::-webkit-scrollbar-thumb {
            background: rgba(92, 156, 255, 0.7);
            border-radius: 10px;
        }

        .proxy-chip {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 110px;
            height: 80px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            margin-right: 10px;
            cursor: pointer;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s ease;
            vertical-align: middle;
            position: relative;
        }

        .proxy-chip.active {
            background: rgba(76, 130, 245, 0.25);
            border-color: #5C9CFF;
            box-shadow: 0 8px 20px rgba(46, 91, 255, 0.4);
            transform: scale(1.02);
        }

        .proxy-chip.active::after {
            content: "✓";
            position: absolute;
            top: 8px;
            right: 8px;
            background: #5C9CFF;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
        }

        .chip-name {
            font-weight: 650;
            font-size: 0.85rem;
            color: #fff;
            margin-bottom: 4px;
        }

        .chip-domain {
            font-size: 0.65rem;
            color: rgba(220, 220, 255, 0.7);
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #1E3FBF, #3A6FFF);
            border: none;
            padding: 15px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(30, 63, 191, 0.45);
            letter-spacing: 0.4px;
            margin-top: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .generate-btn:hover {
            background: linear-gradient(135deg, #254EDB, #4B80FF);
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(58, 111, 255, 0.6);
        }

        .result-panel {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(20px);
            border-radius: 18px;
            padding: 18px;
            display: none;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .result-link-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px;
            border-radius: 12px;
            word-break: break-all;
            font-size: 0.9rem;
            margin: 12px 0 14px;
            color: #e0e7ff;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        .audio-trigger {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 48px;
            height: 48px;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(18px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            font-size: 20px;
            z-index: 100;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .audio-trigger:hover {
            background: rgba(45, 45, 70, 0.8);
            transform: scale(1.06);
        }

        .pause-icon { display: none; }
        .audio-trigger.playing .play-icon { display: none; }
        .audio-trigger.playing .pause-icon { display: inline; }

        @media (max-width: 500px) {
            .main-card {
                padding: 24px 18px;
            }
            .brand h1 {
                font-size: 1.9rem;
            }
            .proxy-chip {
                width: 100px;
                height: 72px;
            }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay muted loop playsinline>
        <source src="https://txmov2.a.kwimgs.com/upic/2023/10/13/16/BMjAyMzEwMTMxNjU4MTJfMTcyNTc4NzU4N18xMTQ4OTQ2OTgxMzRfMl8z_b_B209e890a596d64fbd174507b758b0815.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="marquee-ad">
        <a href="https://kelayun.notepin.co" target="_blank">最低2元1000G机场推荐 · 解锁奈飞/TikTok/ChatGPT · 不限速不限设备</a>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://pan.szfx.top/down.php/1bc46e5c041db875a2ddf3a9ede355f8.mp3" type="audio/mpeg">
    </audio>

    <main class="main-card">
        <div class="brand">
            <h1>裤佬代理加速</h1>
            <div class="subtitle">不局限于github，支持任何被墙的网站代理加速</div>
        </div>

        <div class="input-field">
            <div class="label">
                <span>🔗 被墙网址</span>
            </div>
            <div class="input-wrapper">
                <input type="text" id="sourceUrl" placeholder="https://raw.githubusercontent.com/...">
            </div>
        </div>

        <div class="proxy-section">
            <div class="label">
                <span>⚡ 代理站点</span>
            </div>
            <div class="proxy-scroll" id="proxyContainer"></div>
        </div>

        <button class="generate-btn" id="generateBtn">生成加速链接</button>

        <div class="result-panel" id="resultPanel">
            <div style="font-weight: 600; color: #b4c8ff; margin-bottom: 6px;">🚀 加速链接</div>
            <div class="result-link-box" id="resultLink"></div>
            <button class="copy-btn" id="copyBtn">
                <span>📋</span> 复制链接
            </button>
        </div>
    </main>

    <div class="audio-trigger playing" id="audioToggle">
        <span class="play-icon">♪</span>
        <span class="pause-icon">❚❚</span>
    </div>

    <script>
        (function() {
            const proxyList = [
                { name: "seep", url: "https://seep.eu.org/" },
                { name: "030101", url: "https://proxy.api.030101.xyz/" },
                { name: "kuayu", url: "https://kuayu.hellow.eu.org/" },
                { name: "hellow", url: "https://hellow.eu.org/" },
                { name: "workers", url: "https://restless-rice-b2a2.ganpig.workers.dev/cfdownload/" },
                { name: "nigx", url: "https://down.nigx.cn/" }
            ];

            let activeProxy = proxyList[0];
            const container = document.getElementById('proxyContainer');
            const sourceInput = document.getElementById('sourceUrl');
            const generateBtn = document.getElementById('generateBtn');
            const resultPanel = document.getElementById('resultPanel');
            const resultLinkEl = document.getElementById('resultLink');
            const copyBtn = document.getElementById('copyBtn');

            function renderProxies() {
                container.innerHTML = '';
                proxyList.forEach((proxy, idx) => {
                    const chip = document.createElement('div');
                    chip.className = `proxy-chip ${idx === 0 ? 'active' : ''}`;
                    const domain = proxy.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
                    chip.innerHTML = `<div class="chip-name">${proxy.name}</div><div class="chip-domain">${domain}</div>`;
                    
                    chip.addEventListener('click', () => {
                        document.querySelectorAll('.proxy-chip').forEach(c => c.classList.remove('active'));
                        chip.classList.add('active');
                        activeProxy = proxy;
                        chip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                    });
                    container.appendChild(chip);
                });
            }

            function buildAcceleratedUrl(original) {
                const base = activeProxy.url;
                if (base === 'https://down.nigx.cn/') {
                    return base + original.replace(/^https?:\/\//, '');
                }
                return base + original;
            }

            generateBtn.addEventListener('click', () => {
                const rawUrl = sourceInput.value.trim();
                if (!rawUrl) {
                    alert('请输入需要加速的链接');
                    return;
                }
                const accelerated = buildAcceleratedUrl(rawUrl);
                resultLinkEl.textContent = accelerated;
                resultPanel.style.display = 'block';
            });

            copyBtn.addEventListener('click', () => {
                const text = resultLinkEl.textContent;
                navigator.clipboard?.writeText(text).then(() => {
                    copyBtn.innerHTML = '<span>✅</span> 已复制';
                    setTimeout(() => { copyBtn.innerHTML = '<span>📋</span> 复制链接'; }, 2000);
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    copyBtn.innerHTML = '<span>✅</span> 已复制';
                    setTimeout(() => { copyBtn.innerHTML = '<span>📋</span> 复制链接'; }, 2000);
                });
            });

            renderProxies();

            const bgMusic = document.getElementById('bg-music');
            const audioToggle = document.getElementById('audioToggle');
            bgMusic.volume = 0.4;

            function tryPlay() {
                const promise = bgMusic.play();
                if (promise !== undefined) {
                    promise.then(() => audioToggle.classList.add('playing'))
                    .catch(() => {
                        bgMusic.muted = true;
                        bgMusic.play().then(() => {
                            bgMusic.muted = false;
                            audioToggle.classList.add('playing');
                        }).catch(() => {});
                    });
                }
            }

            tryPlay();

            document.addEventListener('click', function userGesturePlay() {
                if (bgMusic.paused) tryPlay();
            }, { once: false });

            audioToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                if (bgMusic.paused) {
                    tryPlay();
                } else {
                    bgMusic.pause();
                    audioToggle.classList.remove('playing');
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && document.activeElement !== sourceInput) {
                    e.preventDefault();
                    audioToggle.click();
                }
            });

            const video = document.getElementById('video-background');
            video.play().catch(() => {});
        })();
    </script>
</body>
</html>
